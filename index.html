<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>なぞの料理をつくろう！</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Kosugi+Maru&display=swap');

  :root {
    --cream:#F5EDD6; --cream-dark:#EAD9B8;
    --red:#8B2020; --brown:#3D1F0D;
    --brown-mid:#6B3A1F; --brown-light:#9C5E30;
    --gold:#C9A227; --gold-light:#E8C547; --green:#2E7D32;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;background:var(--brown);
    font-family:'Kosugi Maru','Hiragino Kaku Gothic ProN',sans-serif;
    overflow:hidden;touch-action:none;user-select:none;}
  #app{width:100%;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;position:relative;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.04) 0,rgba(0,0,0,0.04) 1px,transparent 1px,transparent 28px),
    repeating-linear-gradient(90deg,rgba(0,0,0,0.04) 0,rgba(0,0,0,0.04) 1px,transparent 1px,transparent 28px),
    linear-gradient(160deg,#4a2510 0%,#3D1F0D 50%,#2a1208 100%);}

  .screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;
    align-items:center;justify-content:center;flex-direction:column;}
  .screen.active{display:flex;}

  /* ─── TITLE ─── */
  #title-screen{background:linear-gradient(180deg,#08040f 0%,#120818 30%,#1e0e06 70%,#2a1208 100%);
    justify-content:flex-end;overflow:hidden;padding:0;}
  #title-screen::before{content:'';position:absolute;inset:0;
    background-image:radial-gradient(1.2px 1.2px at 8% 6%,rgba(255,245,210,.9) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 4%,rgba(255,245,210,1) 0%,transparent 100%),
    radial-gradient(1.2px 1.2px at 55% 3%,rgba(255,245,210,.8) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 78% 7%,rgba(255,245,210,.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 18% 12%,rgba(255,245,210,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 66% 14%,rgba(255,245,210,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 2%,rgba(255,245,210,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 18%,rgba(255,245,210,.5) 0%,transparent 100%);
    pointer-events:none;z-index:0;animation:twinkle 6s ease-in-out infinite alternate;}
  @keyframes twinkle{0%{opacity:.7}50%{opacity:1}100%{opacity:.8}}
  #title-screen::after{content:'';position:absolute;top:4%;right:10%;width:44px;height:44px;
    background:radial-gradient(circle at 40% 40%,#FFF8DC,#F0D070);border-radius:50%;
    box-shadow:0 0 20px rgba(240,208,80,.5),0 0 60px rgba(240,208,80,.2);
    pointer-events:none;z-index:0;}
  #restaurant-scene{width:100%;max-width:480px;flex:1;position:relative;
    display:flex;align-items:flex-end;justify-content:center;overflow:hidden;z-index:1;}
  #restaurant-svg{width:100%;max-width:420px;height:auto;display:block;}
  .lantern-l{transform-origin:126px 38px;animation:swing-l 3.2s ease-in-out infinite alternate;}
  .lantern-r{transform-origin:282px 38px;animation:swing-r 2.9s ease-in-out infinite alternate;}
  @keyframes swing-l{0%{transform:rotate(-5deg)}100%{transform:rotate(5deg)}}
  @keyframes swing-r{0%{transform:rotate(4deg)}100%{transform:rotate(-4deg)}}
  .win-glow{animation:win-pulse 3s ease-in-out infinite alternate;}
  @keyframes win-pulse{0%{opacity:.75}100%{opacity:1}}
  .sign-neon{animation:neon-flicker 5s ease-in-out infinite;}
  @keyframes neon-flicker{0%,88%,100%{opacity:1;filter:drop-shadow(0 0 6px rgba(255,180,60,.9))}
    90%{opacity:.5;filter:none}92%{opacity:1;filter:drop-shadow(0 0 6px rgba(255,180,60,.9))}
    95%{opacity:.7;filter:none}97%{opacity:1;filter:drop-shadow(0 0 6px rgba(255,180,60,.9))}}
  .smoke1{animation:smoke-rise 4s ease-in-out infinite;transform-origin:50% 100%;}
  .smoke2{animation:smoke-rise 4s ease-in-out 1.5s infinite;transform-origin:50% 100%;}
  .smoke3{animation:smoke-rise 4s ease-in-out 2.8s infinite;transform-origin:50% 100%;}
  @keyframes smoke-rise{0%{transform:translateY(0) scale(.3);opacity:.5}50%{opacity:.25}100%{transform:translateY(-28px) scale(1.6);opacity:0}}
  #title-bottom{width:100%;background:linear-gradient(0deg,#0e0604 60%,rgba(14,6,4,0) 100%);
    padding:0 24px 36px;position:relative;z-index:10;text-align:center;}
  .restaurant-label{font-family:'Zen Kurenaido',serif;font-size:12px;color:rgba(201,162,39,.7);letter-spacing:4px;margin-bottom:8px;}
  .game-main-title{font-family:'Zen Kurenaido',serif;font-size:clamp(26px,7.5vw,34px);
    color:var(--cream);text-shadow:0 0 24px rgba(201,162,39,.35),0 2px 6px rgba(0,0,0,.9);
    line-height:1.2;margin-bottom:4px;}
  .game-sub-title{font-size:11px;color:rgba(220,195,145,.5);letter-spacing:3px;margin-bottom:28px;}
  .start-btn{display:inline-block;width:100%;max-width:300px;
    background:linear-gradient(180deg,#A52828 0%,#7a1a1a 100%);color:var(--gold-light);
    border:none;border-radius:3px;padding:17px 24px;
    font-family:'Zen Kurenaido',serif;font-size:19px;letter-spacing:4px;cursor:pointer;
    position:relative;overflow:hidden;
    box-shadow:0 4px 24px rgba(139,32,32,.7),0 0 0 1px rgba(201,162,39,.35),inset 0 1px 0 rgba(255,255,255,.15);
    transition:transform .1s,box-shadow .1s;}
  .start-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;
    background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 100%);}
  .start-btn:active{transform:scale(.97);}
  .title-footer{font-size:10px;color:rgba(200,170,120,.35);letter-spacing:2px;margin-top:14px;}

  /* ─── GAME ─── */
  #game-screen{padding:0;overflow:hidden;}
  #game-header{width:100%;background:var(--red);padding:8px 12px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 2px 8px rgba(0,0,0,.4);flex-shrink:0;position:relative;z-index:10;}
  #game-header .title{font-family:'Zen Kurenaido',serif;color:var(--gold-light);font-size:15px;letter-spacing:1px;}
  #item-tray{display:flex;gap:4px;align-items:center;flex-wrap:wrap;max-width:60%;justify-content:flex-end;}
  .tray-slot{width:28px;height:28px;background:rgba(0,0,0,.25);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:15px;
    border:1.5px solid rgba(255,255,255,.2);transition:all .3s;}
  .tray-slot.filled{background:rgba(201,162,39,.25);border-color:var(--gold);animation:slot-fill .4s ease;}
  @keyframes slot-fill{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  #maze-container{flex:1;width:100%;position:relative;overflow:hidden;}
  #maze-canvas{position:absolute;image-rendering:pixelated;cursor:none;}
  #goal-proximity{position:absolute;inset:0;pointer-events:none;z-index:5;}

  /* アイテム収集プログレス */
  #collect-progress{
    position:absolute;top:8px;left:50%;transform:translateX(-50%);
    background:rgba(30,10,2,.8);border:1.5px solid rgba(201,162,39,.4);
    border-radius:20px;padding:4px 12px;
    font-size:11px;color:var(--gold-light);letter-spacing:1px;
    z-index:20;white-space:nowrap;backdrop-filter:blur(4px);
    box-shadow:0 2px 8px rgba(0,0,0,.4);}
  #collect-progress.complete{
    border-color:var(--gold);color:#FFE87A;
    animation:prog-flash .6s ease;}
  @keyframes prog-flash{0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.4)}
    50%{box-shadow:0 0 20px rgba(201,162,39,.8)}}

  #item-popup{position:fixed;left:50%;transform:translateX(-50%);top:18%;
    background:var(--cream);border:3px solid var(--gold);border-radius:12px;
    padding:14px 22px;text-align:center;z-index:100;
    box-shadow:0 8px 30px rgba(0,0,0,.5);display:none;pointer-events:none;min-width:160px;}
  #item-popup.show{display:block;animation:popup-bounce .5s cubic-bezier(.175,.885,.32,1.275);}
  @keyframes popup-bounce{0%{transform:translateX(-50%) scale(.3);opacity:0}
    60%{transform:translateX(-50%) scale(1.1)}100%{transform:translateX(-50%) scale(1);opacity:1}}
  #popup-emoji{font-size:38px;display:block;margin-bottom:5px;}
  #popup-name{font-size:15px;font-weight:bold;color:var(--brown);}
  #popup-sub{font-size:11px;color:var(--brown-mid);margin-top:3px;}

  /* D-PAD */
  #dpad{position:absolute;bottom:20px;left:16px;width:114px;height:114px;
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    gap:3px;z-index:20;}
  .dpad-btn{background:rgba(30,12,4,.78);border:1.5px solid rgba(255,255,255,.18);
    border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;
    cursor:pointer;backdrop-filter:blur(4px);transition:background .1s,transform .1s;}
  .dpad-btn:active,.dpad-btn.pressed{background:rgba(139,32,32,.85);transform:scale(.93);}
  .dpad-center{background:rgba(201,162,39,.2);border-color:rgba(201,162,39,.3);}
  #item-count{position:absolute;bottom:22px;right:14px;background:var(--cream);
    border-radius:10px;padding:7px 11px;text-align:center;
    border:2px solid var(--brown-light);box-shadow:0 2px 8px rgba(0,0,0,.3);
    z-index:20;font-size:11px;color:var(--brown);}
  #item-count strong{font-size:17px;color:var(--red);display:block;}

  /* ─── GOAL SCREEN ─── */
  #goal-screen{padding:16px;overflow-y:auto;}
  .order-paper{background:#FFFDF0;width:min(360px,93vw);border-radius:2px;
    box-shadow:0 6px 30px rgba(0,0,0,.5),3px 3px 0 rgba(0,0,0,.1);
    position:relative;overflow:hidden;max-height:96vh;overflow-y:auto;}
  .order-paper::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;
    background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 10px,var(--cream) 10px,var(--cream) 20px);}
  .order-header{padding:18px 18px 12px;border-bottom:2px solid rgba(107,58,31,.2);text-align:center;}
  .order-shop{font-size:10px;letter-spacing:3px;color:var(--brown-mid);text-transform:uppercase;}
  .order-title{font-family:'Zen Kurenaido',serif;font-size:21px;color:var(--red);margin:6px 0 4px;}
  .order-body{padding:14px 18px;}
  .collected-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:14px 0;}
  .collected-item{text-align:center;background:var(--cream);border:1px solid rgba(107,58,31,.2);
    border-radius:8px;padding:7px 3px;font-size:22px;}
  .collected-item .cname{font-size:9px;color:var(--brown-mid);display:block;margin-top:3px;line-height:1.3;}
  .order-question{background:rgba(139,32,32,.08);border-left:4px solid var(--red);
    padding:11px 13px;border-radius:0 6px 6px 0;margin:14px 0;
    font-size:13px;color:var(--brown);line-height:1.7;}
  .answer-area{margin:14px 0;}
  .answer-label{font-size:12px;color:var(--brown-mid);margin-bottom:8px;letter-spacing:1px;}
  .answer-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

  /* ★ タッチ操作修正：pointer-events確保 */
  .choice-btn{
    background:var(--cream);border:2px solid rgba(107,58,31,.25);border-radius:8px;
    padding:12px 6px;
    font-family:'Kosugi Maru',sans-serif;font-size:13px;color:var(--brown);
    cursor:pointer;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    -webkit-tap-highlight-color:rgba(139,32,32,.2);
    touch-action:manipulation;
    pointer-events:auto;
    position:relative;z-index:1;
    transition:transform .15s,background .15s;}
  .choice-btn:active{transform:scale(.95);background:var(--cream-dark);}
  .choice-btn .dish-img{font-size:28px;line-height:1;display:block;}
  .choice-btn .dish-label{font-size:12px;margin-top:2px;}
  .choice-btn.correct{background:#E8F5E9;border-color:var(--green);color:var(--green);}
  .choice-btn.wrong{background:#FFEBEE;border-color:var(--red);color:var(--red);animation:shake .4s;}
  .choice-btn.disabled{opacity:.4;pointer-events:none;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

  /* ─── RESULT ─── */
  #result-screen{padding:20px;}
  .result-card{background:var(--cream);border-radius:4px;width:min(360px,92vw);
    text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.6);overflow:hidden;position:relative;}
  .result-card::before{content:'';position:absolute;inset:6px;
    border:1.5px solid rgba(107,58,31,.2);border-radius:2px;pointer-events:none;z-index:1;}
  .result-header-correct{background:var(--red);padding:20px;position:relative;overflow:hidden;}
  .result-header-correct::before{content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(255,255,255,.04) 8px,rgba(255,255,255,.04) 16px);}
  .result-header-wrong{background:var(--brown-mid);padding:20px;}
  .result-label{font-family:'Zen Kurenaido',serif;font-size:28px;color:var(--gold-light);
    text-shadow:0 2px 8px rgba(0,0,0,.4);position:relative;}
  .result-sub{font-size:12px;color:rgba(255,230,180,.8);letter-spacing:2px;margin-top:4px;position:relative;}
  .result-dish{padding:22px 20px;background:linear-gradient(180deg,rgba(245,237,214,.5) 0%,transparent 100%);}
  .dish-emoji{font-size:72px;display:block;animation:dish-appear .6s .2s both cubic-bezier(.175,.885,.32,1.275);}
  @keyframes dish-appear{0%{transform:scale(0) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
  .dish-name{font-family:'Zen Kurenaido',serif;font-size:26px;color:var(--brown);margin:8px 0 4px;}
  .dish-desc{font-size:12px;color:var(--brown-mid);line-height:1.8;}
  .sparkles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .sparkle{position:absolute;font-size:16px;animation:sparkle-fly 2s infinite;opacity:0;}
  @keyframes sparkle-fly{0%{opacity:0;transform:translateY(0) scale(.5)}30%{opacity:1}100%{opacity:0;transform:translateY(-60px) scale(1.2)}}
  .result-body{padding:14px 20px 22px;}
  .replay-btn{display:block;width:100%;background:var(--red);color:var(--gold-light);
    border:none;border-radius:4px;padding:14px;
    font-family:'Zen Kurenaido',serif;font-size:17px;letter-spacing:2px;
    cursor:pointer;margin-top:14px;box-shadow:0 4px 12px rgba(0,0,0,.25);transition:transform .1s;}
  .replay-btn:active{transform:scale(.97);}

  #goal-overlay{position:fixed;inset:0;
    background:radial-gradient(circle,rgba(201,162,39,.2) 0%,transparent 70%);
    pointer-events:none;z-index:50;display:none;}
  #goal-overlay.show{display:block;animation:overlay-flash 1s ease-out;}
  @keyframes overlay-flash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

  #loading{position:fixed;inset:0;background:var(--brown);z-index:200;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
  #loading .logo{font-family:'Zen Kurenaido',serif;color:var(--gold);font-size:20px;letter-spacing:2px;}
  .loading-dots{display:flex;gap:8px;}
  .loading-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:dot-bounce .8s ease-in-out infinite;}
  .loading-dot:nth-child(2){animation-delay:.15s;}
  .loading-dot:nth-child(3){animation-delay:.3s;}
  @keyframes dot-bounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-8px);opacity:1}}
</style>
</head>
<body>
<div id="loading">
  <div class="logo">🌙 準備中...</div>
  <div class="loading-dots">
    <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
  </div>
</div>

<div id="app">

  <!-- ====== TITLE ====== -->
  <div id="title-screen" class="screen">
    <div id="restaurant-scene">
      <svg id="restaurant-svg" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="brick" x="0" y="0" width="24" height="12" patternUnits="userSpaceOnUse">
            <rect width="24" height="12" fill="#5a2e18"/><rect x="1" y="1" width="21" height="9" fill="#6b3620" rx="1"/>
          </pattern>
          <pattern id="wood" x="0" y="0" width="20" height="80" patternUnits="userSpaceOnUse">
            <rect width="20" height="80" fill="#4a2510"/>
            <line x1="3" y1="0" x2="3" y2="80" stroke="#3a1a08" stroke-width=".8" opacity=".6"/>
            <line x1="10" y1="0" x2="10" y2="80" stroke="#3a1a08" stroke-width=".5" opacity=".4"/>
            <line x1="16" y1="0" x2="16" y2="80" stroke="#3a1a08" stroke-width=".8" opacity=".6"/>
          </pattern>
          <radialGradient id="winGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFE4A0" stop-opacity=".9"/>
            <stop offset="60%" stop-color="#FFC86E" stop-opacity=".7"/>
            <stop offset="100%" stop-color="#FF9030" stop-opacity=".2"/>
          </radialGradient>
          <radialGradient id="lantGlow" cx="50%" cy="70%" r="50%">
            <stop offset="0%" stop-color="#FFDD88" stop-opacity="1"/>
            <stop offset="100%" stop-color="#FF8800" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1a0e06"/><stop offset="100%" stop-color="#0a0603"/>
          </linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <rect width="400" height="320" fill="url(#groundGrad)"/>
        <rect x="0" y="272" width="400" height="48" fill="#1a0e07"/>
        <rect x="0" y="272" width="400" height="12" fill="#22120a"/>
        <line x1="0" y1="278" x2="400" y2="278" stroke="#2e1810" stroke-width="1.5"/>
        <ellipse cx="200" cy="275" rx="100" ry="4" fill="rgba(255,180,60,.07)"/>
        <rect x="40" y="258" width="320" height="18" fill="#2e1a0e" rx="2"/>
        <rect x="44" y="260" width="312" height="14" fill="#3a2010" rx="1"/>
        <rect x="48" y="80" width="304" height="182" fill="url(#brick)"/>
        <rect x="42" y="74" width="316" height="10" fill="#3a1f10" rx="1"/>
        <rect x="44" y="74" width="312" height="7" fill="#4a2818" rx="1"/>
        <polygon points="30,80 200,22 370,80" fill="#2a1206"/>
        <polygon points="36,80 200,26 364,80" fill="#3a1a08"/>
        <line x1="60" y1="72" x2="340" y2="72" stroke="#2a1206" stroke-width="2" opacity=".6"/>
        <line x1="80" y1="62" x2="320" y2="62" stroke="#2a1206" stroke-width="2" opacity=".5"/>
        <line x1="106" y1="50" x2="294" y2="50" stroke="#2a1206" stroke-width="2" opacity=".4"/>
        <polygon points="196,22 200,14 204,22" fill="#4a2818"/>
        <circle cx="200" cy="13" r="4" fill="#6b3620"/><circle cx="200" cy="13" r="2.5" fill="#8B5030"/>
        <rect x="148" y="24" width="16" height="40" fill="#3a1f0e" rx="1"/>
        <rect x="145" y="22" width="22" height="6" fill="#2a1208" rx="2"/>
        <g class="smoke1"><ellipse cx="156" cy="20" rx="4" ry="5" fill="rgba(200,160,120,.25)"/></g>
        <g class="smoke2"><ellipse cx="152" cy="16" rx="3" ry="4" fill="rgba(200,160,120,.18)"/></g>
        <g class="smoke3"><ellipse cx="158" cy="13" rx="3.5" ry="5" fill="rgba(200,160,120,.15)"/></g>
        <path d="M52,120 Q200,106 348,120 L348,140 Q200,126 52,140 Z" fill="#8B2020"/>
        <path d="M52,120 Q116,111 180,113 L180,133 Q116,131 52,140 Z" fill="#A83030" opacity=".6"/>
        <path d="M220,113 Q284,111 348,120 L348,140 Q284,131 220,133 Z" fill="#A83030" opacity=".6"/>
        <path d="M52,140 Q200,126 348,140" stroke="#6b1a1a" stroke-width="2" fill="none"/>
        <g fill="#6b1a1a" opacity=".8">
          <path d="M60,140 L58,150 L65,140"/><path d="M80,139 L78,149 L85,139"/>
          <path d="M100,138 L98,148 L105,138"/><path d="M120,137 L118,147 L125,137"/>
          <path d="M140,136 L138,146 L145,136"/><path d="M160,136 L158,146 L165,136"/>
          <path d="M180,136 L178,146 L185,136"/><path d="M200,136 L198,146 L205,136"/>
          <path d="M220,136 L218,146 L225,136"/><path d="M240,136 L238,146 L245,136"/>
          <path d="M260,136 L258,146 L265,136"/><path d="M280,137 L278,147 L285,137"/>
          <path d="M300,138 L298,148 L305,138"/><path d="M320,139 L318,149 L325,139"/>

// =============================================
// MAZE
// =============================================
const COLS=15, ROWS=19;
let maze=[], playerX=1, playerY=1;
const goalX=COLS-2, goalY=ROWS-2;
let goalVisible=false;   // ← 全必須アイテム収集後にtrue
let goalReached=false;
let decorations=[];

function generateMaze(){
  maze=[];
  for(let y=0;y<ROWS;y++){
    maze[y]=[];
    for(let x=0;x<COLS;x++) maze[y][x]={wall:true,visited:false,wallType:Math.floor(Math.random()*3)};
  }
  function carve(x,y){
    maze[y][x].wall=false; maze[y][x].visited=true;
    for(const [dx,dy] of shuffle([[0,-2],[2,0],[0,2],[-2,0]])){
      const nx=x+dx, ny=y+dy;
      if(nx>0&&nx<COLS-1&&ny>0&&ny<ROWS-1&&!maze[ny][nx].visited){
        maze[y+dy/2][x+dx/2].wall=false;
        carve(nx,ny);
      }
    }
  }
  carve(1,1);
  maze[1][1].wall=false;
  maze[ROWS-2][COLS-2].wall=false;
  for(let i=0;i<8;i++){
    const rx=1+Math.floor(Math.random()*(COLS-2));
    const ry=1+Math.floor(Math.random()*(ROWS-2));
    if(rx>0&&rx<COLS-1&&ry>0&&ry<ROWS-1) maze[ry][rx].wall=false;
  }
  generateDecorations();
}

function generateDecorations(){
  decorations=[];
  // 道には食材のみ置く。装飾オブジェクトは配置しない。
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// =============================================
// ITEMS
// =============================================
let placedItems=[], collectedItems=[];
let requiredCollected=0;
const REQUIRED_COUNT=REQUIRED_ITEMS.length; // 8

function placeItems(){
  placedItems=[]; collectedItems=[]; requiredCollected=0; goalVisible=false;
  const allItems=[...REQUIRED_ITEMS,...MISLEAD_ITEMS];
  const openCells=[];
  for(let y=1;y<ROWS-1;y++)
    for(let x=1;x<COLS-1;x++)
      if(!maze[y][x].wall){
        const dS=Math.abs(x-1)+Math.abs(y-1);
        const dG=Math.abs(x-goalX)+Math.abs(y-goalY);
        if(dS>2&&dG>1) openCells.push({x,y});
      }
  shuffle(openCells).forEach((cell,i)=>{
    if(allItems[i]) placedItems.push({...allItems[i],x:cell.x,y:cell.y,collected:false,
      isRequired:i<REQUIRED_ITEMS.length});
  });
}

function updateProgress(){
  requiredCollected=collectedItems.filter(i=>i.isRequired).length;
  const el=document.getElementById('collect-progress');
  el.textContent=`食材: ${requiredCollected} / ${REQUIRED_COUNT}`;
  if(requiredCollected>=REQUIRED_COUNT){
    el.classList.add('complete');
    el.textContent='✨ 全食材GET！ゴールを探せ！';
    if(!goalVisible){
      goalVisible=true;
      prebuildBG(); // ゴール出現でBG再描画
      showGoalAppearEffect();
    }
  }
}

function showGoalAppearEffect(){
  // ゴール出現フラッシュ
  const overlay=document.getElementById('goal-overlay');
  overlay.classList.add('show');
  setTimeout(()=>overlay.classList.remove('show'),1000);
}

// =============================================
// CANVAS & BG CACHE
// =============================================
let canvas,ctx,cellSize=0;
let playerPx=0,playerPy=0,targetPx=0,targetPy=0;
let moving=false,animFrame=0,playerBounce=0,bounceDir=1;
let playerDir='down';
let goalPulse=0;
let bgCanvas=null,bgCtx=null;

function initCanvas(){
  canvas=document.getElementById('maze-canvas');
  ctx=canvas.getContext('2d');
  const container=document.getElementById('maze-container');
  const w=container.clientWidth;
  const headerH=document.getElementById('game-header').offsetHeight;
  const h=window.innerHeight-headerH;
  cellSize=Math.min(Math.floor(w/COLS),Math.floor(h/ROWS),28);
  canvas.width=COLS*cellSize; canvas.height=ROWS*cellSize;
  const offX=Math.floor((w-canvas.width)/2);
  const offY=Math.floor((h-canvas.height)/2);
  canvas.style.left=offX+'px'; canvas.style.top=offY+'px';
  playerPx=playerX*cellSize+cellSize/2;
  playerPy=playerY*cellSize+cellSize/2;
  targetPx=playerPx; targetPy=playerPy;
  goalReached=false;
  prebuildBG();
}

function prebuildBG(){
  bgCanvas=document.createElement('canvas');
  bgCanvas.width=(bgCanvas.width||(COLS*cellSize));
  bgCanvas.height=(bgCanvas.height||(ROWS*cellSize));
  if(canvas){bgCanvas.width=canvas.width;bgCanvas.height=canvas.height;}
  bgCtx=bgCanvas.getContext('2d');
  drawBG(bgCtx);
}

// =============================================
// 3D WALL DRAW
// =============================================
function drawBG(c){
  const cs=cellSize;
  c.fillStyle='#1e0d05';
  c.fillRect(0,0,bgCanvas.width,bgCanvas.height);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const px=x*cs, py=y*cs;
      if(maze[y][x].wall){
        draw3DWall(c,px,py,cs,maze[y][x].wallType,x,y);
      } else {
        drawFloorCell(c,px,py,cs,x,y);
      }
    }
  }
  // 壁の3Dエッジ（通路面に面した壁の上面/側面）- パス後
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(maze[y][x].wall) draw3DWallEdge(c,x,y,cs);
    }
  }

  drawStart(c,1,1,cs);
  if(goalVisible) drawGoalBG(c,goalX,goalY,cs);
}

// --- 3D壁セル本体 ---
function draw3DWall(c,px,py,cs,wtype,wx,wy){
  // 壁の正面色（やや明るめ）
  const cols=['#5a2e14','#523018','#4e2810'];
  c.fillStyle=cols[wtype];
  c.fillRect(px,py,cs,cs);

  // 木目の縦線
  const step=Math.max(3,Math.floor(cs/4));
  for(let i=1;i<4;i++){
    const lx=px+Math.floor(i*step+(wx*2+wy)%step);
    if(lx>=px&&lx<px+cs){
      c.strokeStyle=`rgba(0,0,0,${0.12+0.06*(i%2)})`;
      c.lineWidth=0.7;
      c.beginPath(); c.moveTo(lx,py); c.lineTo(lx,py+cs); c.stroke();
    }
  }

  // 上辺ハイライト（光が上から当たる）
  c.fillStyle='rgba(255,200,130,0.18)';
  c.fillRect(px,py,cs,2);

  // 下辺影
  c.fillStyle='rgba(0,0,0,0.45)';
  c.fillRect(px,py+cs-3,cs,3);
}

// --- 3D壁エッジ（通路に面した側に奥行き演出） ---
function draw3DWallEdge(c,wx,wy,cs){
  const px=wx*cs, py=wy*cs;
  const EDGE=Math.max(3,Math.floor(cs*0.22)); // 奥行き幅

  // 下が通路 → 下エッジ（壁の底面を斜めに）
  if(wy+1<ROWS&&!maze[wy+1][wx].wall){
    c.fillStyle='rgba(0,0,0,0.55)';
    c.beginPath();
    c.moveTo(px,py+cs);
    c.lineTo(px+cs,py+cs);
    c.lineTo(px+cs-EDGE,py+cs-EDGE);
    c.lineTo(px+EDGE,py+cs-EDGE);
    c.closePath();
    c.fill();
    // ハイライト線
    c.strokeStyle='rgba(255,180,80,0.12)';
    c.lineWidth=1;
    c.beginPath();
    c.moveTo(px+EDGE,py+cs-EDGE);
    c.lineTo(px+cs-EDGE,py+cs-EDGE);
    c.stroke();
  }
  // 右が通路 → 右エッジ
  if(wx+1<COLS&&!maze[wy][wx+1].wall){
    c.fillStyle='rgba(0,0,0,0.45)';
    c.beginPath();
    c.moveTo(px+cs,py);
    c.lineTo(px+cs,py+cs);
    c.lineTo(px+cs-EDGE,py+cs-EDGE);
    c.lineTo(px+cs-EDGE,py+EDGE);
    c.closePath();
    c.fill();
  }
  // 上が通路 → 上面（天井側：やや明るく）
  if(wy-1>=0&&!maze[wy-1][wx].wall){
    c.fillStyle='rgba(255,200,100,0.1)';
    c.beginPath();
    c.moveTo(px,py);
    c.lineTo(px+cs,py);
    c.lineTo(px+cs-EDGE,py+EDGE);
    c.lineTo(px+EDGE,py+EDGE);
    c.closePath();
    c.fill();
  }
  // 左が通路 → 左エッジ（明るめ）
  if(wx-1>=0&&!maze[wy][wx-1].wall){
    c.fillStyle='rgba(255,180,80,0.1)';
    c.beginPath();
    c.moveTo(px,py);
    c.lineTo(px,py+cs);
    c.lineTo(px+EDGE,py+cs-EDGE);
    c.lineTo(px+EDGE,py+EDGE);
    c.closePath();
    c.fill();
  }
}

// --- 床セル ---
function drawFloorCell(c,px,py,cs,x,y){
  const checker=(x+y)%2===0;
  c.fillStyle=checker?'#E4CFA0':'#D0B880';
  c.fillRect(px,py,cs,cs);
  c.fillStyle=checker?'rgba(255,255,255,0.14)':'rgba(255,255,255,0.07)';
  c.fillRect(px+1,py+1,cs*0.38,cs*0.3);
  c.strokeStyle='rgba(90,50,15,0.18)';
  c.lineWidth=0.5;
  c.strokeRect(px+0.5,py+0.5,cs-1,cs-1);
  if((x+y)%4===0){
    c.fillStyle='rgba(130,80,20,0.1)';
    c.beginPath(); c.arc(px+cs/2,py+cs/2,cs*0.1,0,Math.PI*2); c.fill();
  }
}

// --- スタート ---
function drawStart(c,sx,sy,cs){
  const px=sx*cs, py=sy*cs;
  c.fillStyle='rgba(139,32,32,0.32)';
  c.beginPath(); c.arc(px+cs/2,py+cs/2,cs*0.44,0,Math.PI*2); c.fill();
  c.strokeStyle='rgba(201,162,39,0.65)';
  c.lineWidth=1.5;
  c.beginPath(); c.arc(px+cs/2,py+cs/2,cs*0.43,0,Math.PI*2); c.stroke();
}

// --- ゴール背景 ---
function drawGoalBG(c,gx,gy,cs){
  const px=gx*cs, py=gy*cs;
  c.fillStyle='#8B1A1A'; c.fillRect(px,py,cs,cs);
  c.fillStyle='rgba(139,32,32,0.8)'; c.fillRect(px+2,py+2,cs-4,cs-4);
  c.strokeStyle='rgba(201,162,39,0.4)'; c.lineWidth=0.8;
  c.beginPath();
  c.moveTo(px+cs/2,py+2); c.lineTo(px+cs/2,py+cs-2);
  c.moveTo(px+2,py+cs/2); c.lineTo(px+cs-2,py+cs/2);
  c.stroke();
}

// --- 装飾 ---
function drawDecoration(c,px,py,cs,type){
  const cx=px+cs/2, cy=py+cs/2;
  c.save(); c.globalAlpha=0.72;
  if(type==='table'){
    c.fillStyle='#5a2e10';
    c.beginPath(); c.arc(cx,cy,cs*0.3,0,Math.PI*2); c.fill();
    c.strokeStyle='#3a1a08'; c.lineWidth=1;
    c.stroke();
    c.fillStyle='rgba(255,200,100,0.15)';
    c.beginPath(); c.arc(cx-cs*0.08,cy-cs*0.08,cs*0.09,0,Math.PI*2); c.fill();
  } else if(type==='plant'){
    c.fillStyle='#2e1408'; c.fillRect(cx-cs*0.09,cy,cs*0.18,cs*0.25);
    c.fillStyle='#1e4010'; c.beginPath(); c.arc(cx,cy-cs*0.04,cs*0.21,0,Math.PI*2); c.fill();
    c.fillStyle='#2e6018'; c.beginPath(); c.arc(cx-cs*0.1,cy-cs*0.1,cs*0.13,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(cx+cs*0.1,cy-cs*0.08,cs*0.11,0,Math.PI*2); c.fill();
  } else {
    c.fillStyle='#4a2010'; c.fillRect(px+cs*0.2,py+cs*0.34,cs*0.6,cs*0.44);
    c.fillRect(px+cs*0.2,py+cs*0.14,cs*0.6,cs*0.17);
    c.strokeStyle='#3a1808'; c.lineWidth=0.8;
    c.strokeRect(px+cs*0.2,py+cs*0.34,cs*0.6,cs*0.44);
  }
  c.restore();
}

// =============================================
// DRAW LOOP
// =============================================
function drawMaze(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(bgCanvas,0,0);

  // ゴールパルス（goalVisible時のみ）
  const gx=goalX*cellSize, gy=goalY*cellSize;
  goalPulse+=0.065;
  const gp=0.5+0.5*Math.sin(goalPulse);

  if(goalVisible){
    const distToGoal=Math.abs(playerX-goalX)+Math.abs(playerY-goalY);
    const nearBoost=distToGoal<=4?(1+(4-distToGoal)*0.18):1;
    const grad=ctx.createRadialGradient(gx+cellSize/2,gy+cellSize/2,0,gx+cellSize/2,gy+cellSize/2,cellSize*2.8*nearBoost);
    grad.addColorStop(0,`rgba(201,162,39,${0.6*(0.7+0.3*gp)*nearBoost})`);
    grad.addColorStop(0.4,`rgba(201,162,39,${0.2*gp})`);
    grad.addColorStop(1,'rgba(201,162,39,0)');
    ctx.fillStyle=grad;
    ctx.fillRect(gx-cellSize*3,gy-cellSize*3,cellSize*7,cellSize*7);
    ctx.fillStyle=`rgba(255,225,80,${0.12+0.1*gp})`;
    ctx.fillRect(gx,gy,cellSize,cellSize);
    // GOAL文字
    ctx.save();
    ctx.shadowColor='rgba(201,162,39,0.95)';
    ctx.shadowBlur=10+5*gp;
    ctx.font=`bold ${Math.max(7,cellSize*0.32)}px serif`;
    ctx.fillStyle=`rgba(255,220,60,${0.92+0.08*gp})`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('GOAL',gx+cellSize/2,gy+cellSize/2);
    ctx.restore();
    // 近接プロキシミティ
    if(distToGoal<=5){
      const alpha=(5-distToGoal)/5*0.13*nearBoost;
      const prox=document.getElementById('goal-proximity');
      const gxPct=Math.round((gx+cellSize/2)/canvas.width*100);
      const gyPct=Math.round((gy+cellSize/2)/canvas.height*100);
      prox.style.background=`radial-gradient(circle at ${gxPct}% ${gyPct}%, rgba(201,162,39,${alpha*2}) 0%, rgba(201,162,39,0) 65%)`;
    } else {
      document.getElementById('goal-proximity').style.background='none';
    }
  } else {
    document.getElementById('goal-proximity').style.background='none';
  }

  // スタートパルス
  const sp=0.6+0.4*Math.abs(Math.sin(animFrame*0.04));
  const spx=cellSize, spy=cellSize;
  if(playerX!==1||playerY!==1){
    ctx.save();
    ctx.globalAlpha=sp*0.38;
    const sGrad=ctx.createRadialGradient(spx+cellSize/2,spy+cellSize/2,0,spx+cellSize/2,spy+cellSize/2,cellSize*0.75);
    sGrad.addColorStop(0,'rgba(255,255,255,0.5)'); sGrad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sGrad;
    ctx.fillRect(spx-cellSize*0.3,spy-cellSize*0.3,cellSize*1.6,cellSize*1.6);
    ctx.restore();
    ctx.save();
    ctx.font=`bold ${Math.max(6,cellSize*0.27)}px serif`;
    ctx.fillStyle='rgba(240,200,80,0.75)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(200,150,40,0.5)'; ctx.shadowBlur=4;
    ctx.fillText('START',spx+cellSize/2,spy+cellSize/2);
    ctx.restore();
  }

  // アイテム
  placedItems.forEach(item=>{
    if(item.collected) return;
    const ix=item.x*cellSize+cellSize/2;
    const iy=item.y*cellSize+cellSize/2;
    const b=Math.sin(animFrame*0.08+item.x*0.7)*1.5;
    const dist=Math.abs(item.x-playerX)+Math.abs(item.y-playerY);
    const near=dist<=2;
    ctx.save();
    if(near){
      ctx.shadowColor=item.isRequired?'rgba(255,220,80,1.0)':'rgba(200,150,80,0.8)';
      ctx.shadowBlur=14;
      const rg=ctx.createRadialGradient(ix,iy+b,0,ix,iy+b,cellSize*0.52);
      rg.addColorStop(0,item.isRequired?'rgba(255,220,80,0.28)':'rgba(255,180,60,0.18)');
      rg.addColorStop(1,'rgba(255,200,80,0)');
      ctx.fillStyle=rg;
      ctx.fillRect(ix-cellSize,iy+b-cellSize,cellSize*2,cellSize*2);
    } else {
      ctx.shadowColor=item.isRequired?'rgba(201,162,39,0.45)':'rgba(140,90,40,0.3)';
      ctx.shadowBlur=5;
    }
    ctx.font=`${cellSize*(near?0.65:0.6)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(item.emoji,ix,iy+b);
    ctx.restore();
  });

  // プレイヤー
  drawPlayer(ctx);
  animFrame++;
}

// =============================================
// PLAYER DRAW（v2テイスト・大きめ）
// =============================================
function drawPlayer(c){
  const px=playerPx, py=playerPy;
  const isMoving=Math.abs(playerPx-targetPx)>0.5||Math.abs(playerPy-targetPy)>0.5;
  playerBounce+=0.14*bounceDir;
  if(Math.abs(playerBounce)>2.5) bounceDir*=-1;
  const bounce=isMoving?playerBounce*1.3:playerBounce*0.45;
  const cs=cellSize;

  // 足元影
  c.save();
  c.fillStyle='rgba(0,0,0,0.38)';
  c.beginPath();
  c.ellipse(px,py+cs*0.36,cs*0.3,cs*0.1,0,0,Math.PI*2);
  c.fill();
  c.restore();

  // ソフトグロー
  c.save();
  const gr=ctx.createRadialGradient(px,py-2+bounce,0,px,py-2+bounce,cs*0.62);
  gr.addColorStop(0,'rgba(255,200,130,0.35)');
  gr.addColorStop(1,'rgba(255,180,80,0)');
  c.fillStyle=gr;
  c.beginPath(); c.arc(px,py-2+bounce,cs*0.62,0,Math.PI*2); c.fill();
  c.restore();

  // 移動時残像
  if(isMoving){
    let tx=0,ty=0;
    if(playerDir==='up')    ty=cs*0.22;
    if(playerDir==='down')  ty=-cs*0.22;
    if(playerDir==='left')  tx=cs*0.22;
    if(playerDir==='right') tx=-cs*0.22;
    c.save(); c.globalAlpha=0.14;
    c.font=`${cs*0.78}px serif`;
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('👨‍🍳',px+tx,py-2+bounce+ty);
    c.restore();
  }

  // シェフ本体（v2スタイル：グロー＋サイズ大きめ）
  c.save();
  c.shadowColor='rgba(255,160,60,0.55)';
  c.shadowBlur=12;
  c.font=`${cs*0.82}px serif`; // ← 大きめ
  c.textAlign='center'; c.textBaseline='middle';
  c.fillText('👨‍🍳',px,py-2+bounce);
  c.restore();
}

// =============================================
// MOVEMENT
// =============================================
let moveInterval=null, currentDir=null;

function startMove(dir){
  if(currentDir===dir&&moveInterval) return;
  currentDir=dir;
  if(moveInterval) clearInterval(moveInterval);
  doMove(dir);
  moveInterval=setInterval(()=>{ if(currentDir) doMove(currentDir); },140);
}

function stopMove(){
  currentDir=null;
  if(moveInterval){ clearInterval(moveInterval); moveInterval=null; }
}

function doMove(dir){
  if(moving) return;
  let nx=playerX, ny=playerY;
  if(dir==='up')    ny--;
  if(dir==='down')  ny++;
  if(dir==='left')  nx--;
  if(dir==='right') nx++;
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS) return;
  if(maze[ny][nx].wall) return;
  // ゴールは goalVisible 時のみ踏める
  if(nx===goalX&&ny===goalY&&!goalVisible) return;
  playerDir=dir;
  playerX=nx; playerY=ny;
  targetPx=playerX*cellSize+cellSize/2;
  targetPy=playerY*cellSize+cellSize/2;
  const item=placedItems.find(i=>!i.collected&&i.x===playerX&&i.y===playerY);
  if(item) collectItem(item);
  if(playerX===goalX&&playerY===goalY&&goalVisible&&!goalReached){
    goalReached=true;
    setTimeout(showGoal,400);
  }
}

function animatePlayer(){
  const lerp=0.32;
  playerPx+=(targetPx-playerPx)*lerp;
  playerPy+=(targetPy-playerPy)*lerp;
  if(Math.abs(playerPx-targetPx)<0.5&&Math.abs(playerPy-targetPy)<0.5){
    playerPx=targetPx; playerPy=targetPy; moving=false;
  } else { moving=true; }
  drawMaze();
  requestAnimationFrame(animatePlayer);
}

// =============================================
// COLLECT
// =============================================
function collectItem(item){
  item.collected=true; collectedItems.push(item);
  prebuildBG();
  updateProgress();
  const popup=document.getElementById('item-popup');
  document.getElementById('popup-emoji').textContent=item.emoji;
  document.getElementById('popup-name').textContent=item.name+' をゲット！';
  document.getElementById('popup-sub').textContent=item.hint;
  popup.classList.add('show');
  setTimeout(()=>popup.classList.remove('show'),1600);
  updateTray();
  document.getElementById('count-num').textContent=collectedItems.length;
}

function updateTray(){
  const tray=document.getElementById('item-tray');
  tray.innerHTML='';
  collectedItems.slice(-6).forEach(item=>{
    const slot=document.createElement('div');
    slot.className='tray-slot filled';
    slot.textContent=item.emoji;
    tray.appendChild(slot);
  });
}

// =============================================
// SWIPE
// =============================================
let touchStartX=0,touchStartY=0;

function initSwipe(){
  const con=document.getElementById('maze-container');
  con.addEventListener('touchstart',e=>{ touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; },{passive:true});
  con.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    const aDx=Math.abs(dx),aDy=Math.abs(dy);
    if(Math.max(aDx,aDy)<12) return;
    if(aDx>aDy) doMove(dx>0?'right':'left');
    else doMove(dy>0?'down':'up');
  },{passive:true});
}

document.addEventListener('keydown',e=>{
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
  if(m[e.key]){ e.preventDefault(); startMove(m[e.key]); }
});
document.addEventListener('keyup',e=>{
  const m={ArrowUp:1,ArrowDown:1,ArrowLeft:1,ArrowRight:1,w:1,s:1,a:1,d:1};
  if(m[e.key]) stopMove();
});

// SCREENS
// =============================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(){
  showScreen('game-screen');
  generateMaze(); placeItems();
  playerX=1; playerY=1;
  playerDir='down'; goalReached=false; goalVisible=false;
  initCanvas(); initSwipe();
  document.getElementById('item-tray').innerHTML='';
  document.getElementById('count-num').textContent='0';
  document.getElementById('collect-progress').classList.remove('complete');
  updateProgress();
  requestAnimationFrame(animatePlayer);
}

function showGoal(){
  const overlay=document.getElementById('goal-overlay');
  overlay.classList.add('show');
  setTimeout(()=>overlay.classList.remove('show'),1000);
  setTimeout(()=>{ showScreen('goal-screen'); buildGoalScreen(); },700);
}

function buildGoalScreen(){
  const grid=document.getElementById('collected-grid');
  grid.innerHTML='';
  collectedItems.forEach(item=>{
    const div=document.createElement('div');
    div.className='collected-item';
    div.innerHTML=`${item.emoji}<span class="cname">${item.name}</span>`;
    grid.appendChild(div);
  });

  // 選択肢（タッチ対応版）
  const choices=shuffle([...ANSWERS]);
  const container=document.getElementById('answer-choices');
  container.innerHTML='';
  choices.forEach(ans=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.type='button';
    // ★ SVGイメージ + ラベル
    btn.innerHTML=`<span class="dish-img">${ans.svg}</span><span class="dish-label">${ans.name}</span>`;

    // ★ touchend でも clickと同等に動作させる
    let tapped=false;
    btn.addEventListener('touchend',function(e){
      e.preventDefault();
      if(tapped) return; tapped=true;
      checkAnswer(ans,btn,container);
    },{passive:false});
    btn.addEventListener('click',function(){
      if(tapped) return; tapped=true;
      checkAnswer(ans,btn,container);
    });
    container.appendChild(btn);
  });
}

function checkAnswer(ans,btn,container){
  container.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
  if(ans.correct){
    btn.classList.add('correct'); btn.classList.remove('disabled');
    setTimeout(()=>showResult(true),800);
  } else {
    btn.classList.add('wrong');
    setTimeout(()=>{
      container.querySelectorAll('.choice-btn').forEach(b=>{
        b.classList.remove('disabled');
        // tappedフラグリセット
        b._tapped=false;
      });
      btn.classList.remove('wrong');
      // 再タップ可能にするためイベントを再設定
      rebuildChoiceEvents(container);
    },700);
  }
}

function rebuildChoiceEvents(container){
  container.querySelectorAll('.choice-btn').forEach(btn=>{
    const clone=btn.cloneNode(true);
    btn.parentNode.replaceChild(clone,btn);
  });
  // 再登録
  const choices=Array.from(container.querySelectorAll('.choice-btn'));
  choices.forEach((btn,i)=>{
    // ANSWERSとの対応をdata属性で保持
    const ansId=btn.dataset.ansId;
    const ans=ANSWERS.find(a=>a.id===ansId);
    if(!ans) return;
    let tapped=false;
    btn.addEventListener('touchend',function(e){
      e.preventDefault(); if(tapped) return; tapped=true;
      checkAnswer(ans,btn,container);
    },{passive:false});
    btn.addEventListener('click',function(){
      if(tapped) return; tapped=true;
      checkAnswer(ans,btn,container);
    });
  });
}

  setTimeout(()=>{ showScreen('goal-screen'); buildGoalScreenFull(); },700);
}

function showResult(correct){
  showScreen('result-screen');
  const card=document.getElementById('result-card');
  if(correct){
    card.innerHTML=`
      <div class="sparkles" id="sparkles"></div>
      <div class="result-header-correct">
        <div class="result-label">🎉 せいかい！</div>
        <div class="result-sub">PERFECT · EXCELLENT</div>
      </div>
      <div class="result-dish">
        <div style="font-size:80px;display:block;margin:0 auto;line-height:1;animation:dish-appear .6s .2s both cubic-bezier(.175,.885,.32,1.275)">
          ${OMURICE_SVG}
        </div>
        <div class="dish-name">オムライス</div>
        <div class="dish-desc">
          卵でごはんを包んだ<br>昭和洋食の名作！<br>
          <span style="color:var(--gold);font-size:11px;">★ ケチャップ&とりにくのチキンライスを<br>ふわふわ卵でくるんで完成 ★</span>
        </div>
      </div>
      <div class="result-body">
        <div style="font-size:12px;color:var(--brown-mid);line-height:1.8;">
          🥚たまご ＋ 🍚ごはん ＋ 🍅ケチャップ<br>
          ＋ 🍗とりにく ＋ 🧅たまねぎ ＋ 🧄にんにく<br>
          ＋ 🫒オリーブ油 ＋ 🍳フライパン<br>
          <span style="color:var(--red);font-size:11px;">→ 完璧なオムライスの完成！</span>
        </div>
        <button class="replay-btn" onclick="restartGame()">もう一度あそぶ ↺</button>
      </div>`;
    const sparkles=document.getElementById('sparkles');
    const symbols=['✨','⭐','🌟','💫','✦'];
    for(let i=0;i<12;i++){
      const s=document.createElement('div');
      s.className='sparkle';
      s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
      s.style.left=Math.random()*100+'%';
      s.style.top=Math.random()*100+'%';
      s.style.animationDelay=Math.random()*2+'s';
      s.style.animationDuration=(1.5+Math.random())+'s';
      sparkles.appendChild(s);
    }
  } else {
    card.innerHTML=`
      <div class="result-header-wrong">
        <div class="result-label" style="color:#FFE0B2;">🤔 うーん…</div>
        <div class="result-sub" style="color:rgba(255,200,150,.8);">ちがうかも？</div>
      </div>
      <div class="result-dish" style="background:none;padding:20px;">
        <span style="font-size:50px;display:block;">💭</span>
        <div class="dish-name" style="font-size:18px;margin-top:8px;">もう一度考えてみよう</div>
        <div class="dish-desc" style="margin-top:8px;">集めた食材をよく見ると…<br>ヒント：洋食屋の定番といえば？</div>
      </div>
      <div class="result-body">
        <button class="replay-btn" onclick="retryGoal()">答えを考え直す 🔄</button>
        <button class="replay-btn" style="margin-top:8px;background:transparent;color:var(--brown-mid);border:2px solid var(--brown-mid);box-shadow:none;" onclick="restartGame()">最初からやり直す ↺</button>
      </div>`;
  }
}

function retryGoal(){ showScreen('goal-screen'); buildGoalScreenFull(); }
function restartGame(){ collectedItems=[]; placedItems=[]; goalReached=false; goalVisible=false; stopMove(); showScreen('title-screen'); }

window.addEventListener('load',()=>{
  setTimeout(()=>{
    const l=document.getElementById('loading');
    l.style.opacity='0'; l.style.transition='opacity .4s';
    setTimeout(()=>l.style.display='none',400);
    showScreen('title-screen');
  },800);
});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
</script>
</body>
</html>
